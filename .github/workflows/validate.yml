name: Detection-as-Code Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-sigma-rules:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate Sigma rule syntax
        run: |
          python3 << 'EOF'
          import yaml
          import os
          import sys

          rules_dir = "sigma-rules/mitre"
          required_fields = ["title", "id", "status", "description", "author", "tags", "logsource", "detection", "level"]
          errors = []
          validated = 0

          for filename in os.listdir(rules_dir):
              if filename.endswith(".yml"):
                  filepath = os.path.join(rules_dir, filename)
                  with open(filepath, "r") as f:
                      try:
                          rule = yaml.safe_load(f)
                          for field in required_fields:
                              if field not in rule:
                                  errors.append(f"{filename}: missing required field '{field}'")
                          validated += 1
                          print(f"PASS: {filename}")
                      except yaml.YAMLError as e:
                          errors.append(f"{filename}: YAML parse error - {e}")

          if errors:
              print(f"\nFAILED - {len(errors)} error(s) found:")
              for error in errors:
                  print(f"  ERROR: {error}")
              sys.exit(1)
          else:
              print(f"\nSUCCESS - All {validated} Sigma rules validated")
          EOF

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  mitre-coverage-report:
    name: MITRE ATT&CK Coverage Report
    runs-on: ubuntu-latest
    needs: validate-sigma-rules

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate MITRE coverage report
        run: |
          python3 << 'EOF'
          import yaml
          import os

          rules_dir = "sigma-rules/mitre"
          techniques = []

          for filename in os.listdir(rules_dir):
              if filename.endswith(".yml"):
                  filepath = os.path.join(rules_dir, filename)
                  with open(filepath, "r") as f:
                      rule = yaml.safe_load(f)
                      tags = rule.get("tags", [])
                      level = rule.get("level", "unknown")
                      title = rule.get("title", filename)
                      for tag in tags:
                          if tag.startswith("attack.t"):
                              technique_id = tag.replace("attack.", "").upper()
                              techniques.append({
                                  "technique": technique_id,
                                  "title": title,
                                  "level": level
                              })

          print("=" * 60)
          print("MITRE ATT&CK COVERAGE REPORT")
          print("=" * 60)
          print(f"Total detection rules: {len(os.listdir(rules_dir))}")
          print(f"MITRE techniques covered: {len(set(t['technique'] for t in techniques))}")
          print("")
          print("TECHNIQUES DETECTED:")
          print("-" * 60)
          seen = set()
          for t in techniques:
              if t['technique'] not in seen:
                  print(f"  [{t['level'].upper()}] {t['technique']} - {t['title']}")
                  seen.add(t['technique'])
          print("=" * 60)
          EOF